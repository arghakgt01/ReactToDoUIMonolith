trigger: none
pool: MyAgentPool

stages:
- stage: Build
  displayName: Build
  jobs:
   - job: Build
     displayName: Build
     steps:
      # - task: Npm@1
      #   displayName: npm install
      #   inputs:
      #     command: 'install'
      #     workingDir: '$(System.DefaultWorkingDirectory)'

# 1. RUN BIOME AND OUTPUT JUNIT XML
      - task: CmdLine@2
        displayName: Run Biome CI & Generate XML Report
        continueOnError: true # Forces pipeline to continue so Azure can publish the report
        inputs:
          script: 'biome ci --reporter=junit --reporter-file=$(System.DefaultWorkingDirectory)/biome-results.xml .'
          workingDir: '$(System.DefaultWorkingDirectory)'

      # 2. PUBLISH JUNIT REPORT TO AZURE DEVOP'S "TESTS" TAB
      - task: PublishTestResults@2
        displayName: Publish Biome Test Results
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'biome-results.xml'
          searchFolder: '$(System.DefaultWorkingDirectory)'
          testRunTitle: 'Biome Lint & Format Checks'
        condition: always() # Guarantees execution even if the script step fails

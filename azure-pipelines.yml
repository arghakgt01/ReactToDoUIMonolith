# 1. RUN BIOME AND OUTPUT JUNIT XML
     - task: PowerShell@2
       continueOnError: true
       displayName: Run Biome CI & Generate XML Report
       inputs:
         targetType: 'inline'
         script: |
          $ReportPath = "$(Common.TestResultsDirectory)\biome-results.xml"
          npx @biomejs/biome check  --reporter=junit --reporter-file=$ReportPath .

